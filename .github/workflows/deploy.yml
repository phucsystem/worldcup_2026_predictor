# CI/CD for the single-VM deployment.
#   PRs            -> test only
#   push to main   -> test -> build & push images to GHCR -> SSH deploy to the VM
#
# Required repo secrets (Settings -> Secrets -> Actions):
#   SSH_HOST         — VM public IP or DNS name
#   SSH_USER         — deploy user on the VM
#   SSH_PRIVATE_KEY  — private key whose public half is in the VM's authorized_keys
# Optional:
#   DEPLOY_DIR       — repo path on the VM (default: ~/worldcup_2026_predictor)
# App secrets (API_FOOTBALL_KEY, DEEPSEEK_API_KEY, SITE_ADDRESS) live in the VM
# .env, NOT in CI. New GHCR packages are PRIVATE by default — after the first push,
# set wc2026-backend/wc2026-frontend to Public once (or have the VM docker-login),
# else `docker compose pull` fails with "denied". See docs/deployment.md.

name: Build & Deploy to Azure VM

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/phucsystem/wc2026-backend
  IMAGE_FRONTEND: ghcr.io/phucsystem/wc2026-frontend

jobs:
  changelog:
    name: Require changelog update
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changelog touched
        run: |
          changed_files="$(git diff --name-only "origin/${GITHUB_BASE_REF}"...HEAD)"
          echo "$changed_files"
          if ! echo "$changed_files" | grep -qx "frontend/public/CHANGELOG.md"; then
            echo "Every PR merged to main must update frontend/public/CHANGELOG.md."
            exit 1
          fi

  test:
    name: Validate app
    runs-on: ubuntu-latest
    # Some backend tests hit a real DB (e.g. /api/tournament/summary), so the job
    # needs a Postgres matching the app's default DATABASE_URL.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wc
          POSTGRES_PASSWORD: wc
          POSTGRES_DB: worldcup
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wc -d worldcup"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://wc:wc@localhost:5432/worldcup
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run migrations
        working-directory: backend
        run: uv run alembic -c db/alembic.ini upgrade head

      - name: Backend tests
        working-directory: backend
        run: uv run pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  e2e:
    name: E2E (Robot Framework)
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wc
          POSTGRES_PASSWORD: wc
          POSTGRES_DB: worldcup
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wc -d worldcup"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://wc:wc@localhost:5432/worldcup
      API_BASE: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Migrate + seed (skeleton + e2e fixture)
        working-directory: backend
        run: |
          uv run alembic -c db/alembic.ini upgrade head
          uv run python -m app.data.seed_openfootball
          uv run python -m app.data.seed_e2e_fixture

      - name: Start backend
        working-directory: backend
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8000/health && break || sleep 2
          done

      - name: Build + start frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          API_BASE=http://localhost:8000 npm run start -- --port 3000 &
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3000/ >/dev/null && break || sleep 2
          done

      - name: Install Robot Framework + Browser
        run: |
          pip install -r e2e/requirements.txt
          rfbrowser init --skip-browsers || rfbrowser init
          npx --yes playwright install --with-deps chromium

      - name: Run e2e suites
        working-directory: e2e
        run: robot --variable BASE_URL:http://localhost:3000 --outputdir results suites/

      - name: Upload Robot report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-robot-report
          path: e2e/results/

  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # GHA build cache (cache-to: type=gha) needs the docker-container driver;
      # the runner's default 'docker' driver can't export cache.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.sha_tag }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.sha_tag }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-push
    # Skips until the VM exists. Enable once provisioned + SSH/Azure secrets are set:
    #   gh variable set DEPLOY_ENABLED --body true
    if: github.event_name != 'pull_request' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # The VM's NSG only allows SSH from the operator IP. Open port 22 for this
      # runner's IP just before deploying, and close it again no matter what.
      - name: Open SSH for this runner
        run: |
          RUNNER_IP="$(curl -fsS https://api.ipify.org)"
          az network nsg rule create \
            -g "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --nsg-name "${{ secrets.AZURE_NSG_NAME }}" \
            -n gha-deploy-tmp --priority 100 --access Allow --protocol Tcp \
            --direction Inbound --destination-port-ranges 22 \
            --source-address-prefixes "${RUNNER_IP}/32" -o none

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd "${DEPLOY_DIR:-$HOME/worldcup_2026_predictor}"
            git pull --ff-only
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f
          envs: DEPLOY_DIR
        env:
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}

      - name: Close SSH for this runner
        if: always()
        run: |
          az network nsg rule delete \
            -g "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --nsg-name "${{ secrets.AZURE_NSG_NAME }}" \
            -n gha-deploy-tmp -o none || true
