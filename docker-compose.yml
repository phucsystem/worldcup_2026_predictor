services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wc
      POSTGRES_PASSWORD: wc
      POSTGRES_DB: worldcup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc -d worldcup"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply migrations + seed the 12-group skeleton, then exit.
  migrate:
    build:
      context: backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://wc:wc@postgres:5432/worldcup
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - "alembic -c db/alembic.ini upgrade head && python -m app.data.seed_openfootball"
    restart: "no"

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://wc:wc@postgres:5432/worldcup
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      BRIEF_TIMEZONE: ${BRIEF_TIMEZONE:-Australia/Melbourne}
      # FIFA World Cup = league 1. Free API-Football plans only cover 2021–2023,
      # so set API_FOOTBALL_SEASON=2022 in .env for real demo data (2026 needs a paid plan).
      API_FOOTBALL_LEAGUE: ${API_FOOTBALL_LEAGUE:-1}
      API_FOOTBALL_SEASON: ${API_FOOTBALL_SEASON:-2026}
      # LangSmith tracing — off unless TRACING=true AND a key is set (see .env.example).
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-worldcup-2026}
      LANGSMITH_ENV: ${LANGSMITH_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # Periodic refresh: collect latest data + regenerate the brief on an interval
  # (default 30 min). Each run prunes stale fixtures, recomputes standings, and
  # republishes the brief for today (BRIEF_TIMEZONE). Reuses the backend image.
  scheduler:
    build:
      context: backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://wc:wc@postgres:5432/worldcup
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      BRIEF_TIMEZONE: ${BRIEF_TIMEZONE:-Australia/Melbourne}
      API_FOOTBALL_LEAGUE: ${API_FOOTBALL_LEAGUE:-1}
      API_FOOTBALL_SEASON: ${API_FOOTBALL_SEASON:-2026}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-1800}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-worldcup-2026}
      LANGSMITH_ENV: ${LANGSMITH_ENV:-dev}
    depends_on:
      backend:
        condition: service_healthy
    # Loop forever: run the full pipeline (collect -> brief) then sleep. A failed
    # run is non-fatal (|| true) so transient API/LLM errors never kill the loop.
    command:
      - sh
      - -c
      - 'while true; do python -m app.pipeline.run || true; sleep "${SCHEDULER_INTERVAL_SECONDS:-1800}"; done'
    restart: unless-stopped

  # Live-score poller: refreshes in-play match score/minute by polling
  # ?live=all, but only while a fixture is in its kickoff window (idle otherwise,
  # so zero API quota overnight). Lightweight — never runs standings or the LLM.
  # Has its own internal loop, so no shell while-loop here.
  live_poller:
    build:
      context: backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://wc:wc@postgres:5432/worldcup
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      API_FOOTBALL_LEAGUE: ${API_FOOTBALL_LEAGUE:-1}
      API_FOOTBALL_SEASON: ${API_FOOTBALL_SEASON:-2026}
      LIVE_POLL_SECONDS: ${LIVE_POLL_SECONDS:-120}
      IDLE_SLEEP_SECONDS: ${IDLE_SLEEP_SECONDS:-300}
      LIVE_WINDOW_HOURS: ${LIVE_WINDOW_HOURS:-3}
    depends_on:
      backend:
        condition: service_healthy
    command: ["python", "-m", "app.pipeline.live_poller"]
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    environment:
      # SSR runs inside the container — reach the API via the compose network DNS.
      API_BASE: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
