<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="860" viewBox="0 0 1000 860" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7E97CC"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2BD37E"/>
    </marker>
  </defs>

  <!-- 1. background panel -->
  <rect x="0" y="0" width="1000" height="860" rx="16" fill="#0B1020"/>

  <!-- title -->
  <text x="32" y="40" fill="#E6ECF8" font-size="22" font-weight="700">WC2026 · Daily Intelligence Pipeline Orchestration</text>
  <text x="32" y="64" fill="#9DB0D4" font-size="13">run_pipeline(target_date) — backend/app/pipeline/run.py · fires once daily at 07:00 AEST</text>

  <!-- 2. grouping container (run_pipeline) -->
  <rect x="84" y="156" width="372" height="512" rx="14" fill="#0E1530" stroke="#3A4D78" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="100" y="182" fill="#9DB0D4" font-size="13" font-weight="700">run_pipeline()</text>

  <!-- 3. arrow paths (orthogonal, edge midpoints, x=270 spine) -->
  <g stroke="#7E97CC" stroke-width="2" fill="none">
    <path d="M270,128 L270,200" marker-end="url(#arrow)"/>
    <path d="M270,244 L270,268" marker-end="url(#arrow)"/>
    <path d="M270,348 L270,372" marker-end="url(#arrow)"/>
    <path d="M270,440 L270,464" marker-end="url(#arrow)"/>
    <path d="M270,520 L270,540" marker-end="url(#arrow)"/>
    <!-- Publish -> DB -->
    <path d="M270,608 L270,704" marker-end="url(#arrow)"/>
    <!-- Collector -> DB (orthogonal around the left) -->
    <path d="M120,306 L56,306 L56,746 L168,746" marker-end="url(#arrow)"/>
    <!-- Live Poller -> DB (orthogonal) -->
    <path d="M760,624 L760,746 L432,746" marker-end="url(#arrow)"/>
  </g>
  <!-- expands-to (dashed, Collector -> backfill callout) -->
  <path d="M420,306 L560,306" stroke="#2BD37E" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>

  <!-- 4. arrow label backgrounds + text -->
  <g font-size="11" fill="#AFC0E4">
    <rect x="206" y="156" width="128" height="16" rx="3" fill="#0B1020" opacity="0.92"/>
    <text x="270" y="168" text-anchor="middle">07:00 AEST (DST-guard)</text>

    <rect x="286" y="640" width="170" height="16" rx="3" fill="#0B1020" opacity="0.92"/>
    <text x="296" y="652">publish article + agent_runs</text>

    <rect x="60" y="520" width="118" height="16" rx="3" fill="#0B1020" opacity="0.92"/>
    <text x="64" y="532">upsert matches/standings</text>

    <rect x="560" y="730" width="130" height="16" rx="3" fill="#0B1020" opacity="0.92"/>
    <text x="566" y="742">live score / elapsed</text>

    <rect x="446" y="290" width="92" height="16" rx="3" fill="#0B1020" opacity="0.92"/>
    <text x="492" y="302" text-anchor="middle" fill="#7DE0AB">expands to ▸</text>
  </g>

  <!-- 5. components -->
  <!-- Scheduler -->
  <rect x="100" y="72" width="340" height="56" rx="12" fill="#1A2236" stroke="#5A6E9C" stroke-width="1.5"/>
  <text x="270" y="96" text-anchor="middle" fill="#E6ECF8" font-size="14" font-weight="700">Scheduler / Job</text>
  <text x="270" y="115" text-anchor="middle" fill="#9DB0D4" font-size="11.5">scheduler_entry.py · is_brief_time() TZ guard</text>

  <!-- Prune -->
  <rect x="120" y="200" width="300" height="44" rx="10" fill="#16203A" stroke="#2A3A5E" stroke-width="1.5"/>
  <text x="270" y="227" text-anchor="middle" fill="#C9D6F0" font-size="12.5">Prune old app_logs</text>

  <!-- Collector (pure python) -->
  <rect x="120" y="268" width="300" height="80" rx="10" fill="#16203A" stroke="#5A6E9C" stroke-width="1.5"/>
  <text x="270" y="293" text-anchor="middle" fill="#E6ECF8" font-size="14" font-weight="700">① Collector pipeline</text>
  <text x="270" y="312" text-anchor="middle" fill="#9DB0D4" font-size="11.5">collect.py — fetch + compute (pure Python)</text>
  <text x="270" y="330" text-anchor="middle" fill="#9DB0D4" font-size="11.5">+ 5 guarded analysis backfills · non-fatal</text>

  <!-- Agent (LLM brief) -->
  <rect x="120" y="372" width="300" height="68" rx="10" fill="#101D3A" stroke="#4D8BFF" stroke-width="1.5"/>
  <text x="270" y="397" text-anchor="middle" fill="#E6ECF8" font-size="14" font-weight="700">② Agent pipeline (LangGraph)</text>
  <text x="270" y="416" text-anchor="middle" fill="#9DB0D4" font-size="11.5">collector → analyst → editor</text>
  <text x="270" y="432" text-anchor="middle" fill="#8FB4FF" font-size="11">DeepSeek · storylines → article</text>

  <!-- Merge -->
  <rect x="120" y="464" width="300" height="56" rx="10" fill="#16203A" stroke="#2A3A5E" stroke-width="1.5"/>
  <text x="270" y="488" text-anchor="middle" fill="#E6ECF8" font-size="13.5" font-weight="700">merge_intelligence()</text>
  <text x="270" y="507" text-anchor="middle" fill="#9DB0D4" font-size="11.5">graft deterministic scenario rows onto LLM output</text>

  <!-- Publish -->
  <rect x="120" y="540" width="300" height="68" rx="10" fill="#16203A" stroke="#2A3A5E" stroke-width="1.5"/>
  <text x="270" y="565" text-anchor="middle" fill="#E6ECF8" font-size="13.5" font-weight="700">Publish</text>
  <text x="270" y="584" text-anchor="middle" fill="#9DB0D4" font-size="11.5">upsert articles (last-good on failure)</text>
  <text x="270" y="600" text-anchor="middle" fill="#9DB0D4" font-size="11.5">insert agent_runs (timings · tokens · cost)</text>

  <!-- Analysis backfills callout -->
  <rect x="560" y="200" width="404" height="300" rx="12" fill="#0E1530" stroke="#2BD37E" stroke-width="1.5"/>
  <text x="580" y="228" fill="#7DE0AB" font-size="13.5" font-weight="700">Analysis backfills (inside ①, in order)</text>
  <text x="580" y="247" fill="#9DB0D4" font-size="11">each independent · fully guarded · keep-last-good</text>

  <!-- structural backfill pills -->
  <rect x="580" y="262" width="364" height="34" rx="8" fill="#16203A" stroke="#3A4D78" stroke-width="1.2"/>
  <text x="596" y="284" fill="#C9D6F0" font-size="12.5">events  ·  goal events → matches.events_json</text>
  <rect x="580" y="304" width="364" height="34" rx="8" fill="#16203A" stroke="#3A4D78" stroke-width="1.2"/>
  <text x="596" y="326" fill="#C9D6F0" font-size="12.5">statistics  ·  possession · shots · xG · corners</text>

  <!-- LLM backfill pills (green) -->
  <rect x="580" y="346" width="364" height="34" rx="8" fill="#0E3A2A" stroke="#2BD37E" stroke-width="1.2"/>
  <text x="596" y="368" fill="#9CF0C4" font-size="12.5">verdict  ·  DeepSeek — 1–2 sentence match read</text>
  <rect x="580" y="388" width="364" height="34" rx="8" fill="#0E3A2A" stroke="#2BD37E" stroke-width="1.2"/>
  <text x="596" y="410" fill="#9CF0C4" font-size="12.5">forecast  ·  DeepSeek — win/draw/win + factors</text>
  <rect x="580" y="430" width="364" height="34" rx="8" fill="#0E3A2A" stroke="#2BD37E" stroke-width="1.2"/>
  <text x="596" y="452" fill="#9CF0C4" font-size="12.5">social highlights  ·  Reddit/Bluesky → DeepSeek</text>

  <text x="580" y="486" fill="#9DB0D4" font-size="11">missing keys/creds → that step simply no-ops</text>

  <!-- Live Poller (out-of-band) -->
  <rect x="560" y="556" width="404" height="68" rx="12" fill="#1A2236" stroke="#F4B740" stroke-width="1.5"/>
  <text x="762" y="581" text-anchor="middle" fill="#E6ECF8" font-size="14" font-weight="700">Live Poller (separate process)</text>
  <text x="762" y="600" text-anchor="middle" fill="#9DB0D4" font-size="11.5">live_poller.py · API-Football ?live=all</text>
  <text x="762" y="616" text-anchor="middle" fill="#F4CE84" font-size="11">polls only inside the kickoff window</text>

  <!-- PostgreSQL cylinder -->
  <g>
    <path d="M168,718 a132,16 0 0,1 264,0 v44 a132,16 0 0,1 -264,0 z" fill="#16203A" stroke="#6B7A9E" stroke-width="1.5"/>
    <path d="M168,718 a132,16 0 0,0 264,0" fill="none" stroke="#6B7A9E" stroke-width="1.5"/>
    <text x="300" y="754" text-anchor="middle" fill="#E6ECF8" font-size="14" font-weight="700">PostgreSQL</text>
    <text x="300" y="772" text-anchor="middle" fill="#9DB0D4" font-size="11">matches · standings · articles · agent_runs</text>
  </g>

  <!-- 8. legend -->
  <g font-size="11.5">
    <rect x="560" y="660" width="404" height="170" rx="10" fill="none"/>
    <rect x="580" y="800" width="16" height="12" rx="3" fill="#16203A" stroke="#5A6E9C"/>
    <text x="604" y="810" fill="#9DB0D4">Pure Python / structural</text>
    <rect x="752" y="800" width="16" height="12" rx="3" fill="#0E3A2A" stroke="#2BD37E"/>
    <text x="776" y="810" fill="#9DB0D4">LLM · DeepSeek</text>
    <line x1="580" y1="828" x2="612" y2="828" stroke="#2BD37E" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="620" y="832" fill="#9DB0D4">expands / out-of-band</text>
  </g>
</svg>
