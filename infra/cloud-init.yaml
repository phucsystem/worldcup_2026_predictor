#cloud-config
# Boots the VM ready to RUN containers (CI builds them, the VM only pulls).
# Installs Docker Engine + compose plugin, a 1 GB swap file, and unattended
# security upgrades. Passed to `az vm create --custom-data`.
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - unattended-upgrades

write_files:
  - path: /etc/apt/keyrings/docker-setup.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
        -o /etc/apt/keyrings/docker.asc
      chmod a+r /etc/apt/keyrings/docker.asc
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
      https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
        > /etc/apt/sources.list.d/docker.list
      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io \
        docker-buildx-plugin docker-compose-plugin
      systemctl enable --now docker

runcmd:
  - bash /etc/apt/keyrings/docker-setup.sh
  - usermod -aG docker azureuser
  - fallocate -l 1G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' >> /etc/fstab
